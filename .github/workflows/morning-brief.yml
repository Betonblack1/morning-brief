name: Generate Morning Brief

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate morning brief
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate

      - name: Commit and push data
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "bot@morning-brief.dev"
          git add data/market-data.json
          git diff --staged --quiet || git commit -m "📊 Brief for $(date +'%Y-%m-%d')"
          git push
