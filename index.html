<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090d;
  --surface: #0b1017;
  --surface2: #10161e;
  --surface3: #151d27;
  --border: #1a2332;
  --border2: #243040;
  --text: #d8e2ec;
  --text2: #a0b0c0;
  --muted: #4a5e72;
  --dim: #263040;
  --green: #00e0a0;
  --green2: #00c890;
  --green-bg: rgba(0,224,160,0.06);
  --green-glow: rgba(0,224,160,0.25);
  --amber: #ffb020;
  --amber-bg: rgba(255,176,32,0.06);
  --red: #ff4060;
  --red-bg: rgba(255,64,96,0.06);
  --blue: #40a0ff;
  --blue-bg: rgba(64,160,255,0.06);
  --cyan: #00d4ff;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── TOPBAR ────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.topbar-left { display: flex; align-items: center; gap: 1.25rem; }
.topbar-logo {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.topbar-logo .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow), 0 0 16px var(--green-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.topbar-nav { display: flex; gap: 0; }
.topbar-nav a {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--muted);
  padding: 0.35rem 0.75rem;
  border-radius: 4px;
  transition: all 0.2s;
}
.topbar-nav a.active { color: var(--text); background: var(--surface3); }
.topbar-nav a:hover:not(.active) { color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.topbar-date { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.05em; }
.countdown-pill {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.65rem;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  min-width: 110px;
  justify-content: center;
}
.countdown-pill.pre { color: var(--green); background: var(--green-bg); border: 1px solid rgba(0,224,160,0.15); }
.countdown-pill.open { color: var(--amber); background: var(--amber-bg); border: 1px solid rgba(255,176,32,0.15); }
.countdown-pill.closed { color: var(--muted); background: var(--surface2); border: 1px solid var(--border); }
.countdown-pill .cdot {
  width: 5px; height: 5px; border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
.countdown-pill.pre .cdot { background: var(--green); box-shadow: 0 0 6px var(--green); }
.countdown-pill.open .cdot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

/* ── INDICES STRIP ─────────────────────────────────── */
.indices-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.idx {
  padding: 0.7rem 1rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.5s ease both;
}
.idx:last-child { border-right: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.idx-top { display: flex; align-items: center; justify-content: space-between; }
.idx-name { font-family: var(--mono); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cyan); }
.idx-spark { width: 48px; height: 18px; }
.idx-val { font-family: var(--mono); font-size: 0.95rem; font-weight: 600; color: var(--text); margin-top: 2px; }
.idx-chg { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; display: flex; align-items: center; gap: 3px; }
.idx-chg.up { color: var(--green); }
.idx-chg.down { color: var(--red); }
.idx-chg.flat { color: var(--muted); }
.idx-chg .arrow { font-size: 0.55rem; }

/* ── KEY LEVELS BAR ────────────────────────────────── */
.key-levels {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  overflow-x: auto;
}
.kl-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 1rem;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}
.kl-item:last-child { border-right: none; }
.kl-tag {
  font-family: var(--mono);
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.1rem 0.35rem;
  border-radius: 2px;
  font-weight: 600;
}
.kl-tag.support { color: var(--green); background: var(--green-bg); }
.kl-tag.resist { color: var(--red); background: var(--red-bg); }
.kl-tag.pivot { color: var(--amber); background: var(--amber-bg); }
.kl-tag.event { color: var(--cyan); background: rgba(0,212,255,0.08); }
.kl-text { font-family: var(--mono); font-size: 0.68rem; color: var(--text2); }
.kl-val { font-family: var(--mono); font-size: 0.68rem; font-weight: 600; color: var(--text); }

/* ── FEAR & GREED GAUGE ────────────────────────────── */
.fg-strip {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.fg-label { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.fg-track {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--red) 0%, var(--amber) 40%, var(--muted) 50%, var(--blue) 60%, var(--green) 100%);
  position: relative;
  opacity: 0.5;
}
.fg-needle {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: left 1s ease;
  border: 2px solid var(--bg);
}
.fg-score {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 700;
  flex-shrink: 0;
  min-width: 28px;
  text-align: right;
}
.fg-mood {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-shrink: 0;
  min-width: 80px;
}

/* ── MAIN GRID ─────────────────────────────────────── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.25rem;
}

/* ── CARDS ─────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  animation: fadeIn 0.5s ease both;
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.card-title {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text2);
}
.badge {
  font-family: var(--mono);
  font-size: 0.52rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 0.12rem 0.45rem;
  border-radius: 3px;
}
.badge-green { color: var(--green); background: var(--green-bg); border: 1px solid rgba(0,224,160,0.12); }
.badge-blue { color: var(--blue); background: var(--blue-bg); border: 1px solid rgba(64,160,255,0.12); }
.badge-amber { color: var(--amber); background: var(--amber-bg); border: 1px solid rgba(255,176,32,0.12); }
.card-body { padding: 1rem; }

/* ── SECTOR HEATMAP ────────────────────────────────── */
.heatmap {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px;
  padding: 0.75rem;
}
.hm-cell {
  border-radius: 4px;
  padding: 0.55rem 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  text-align: center;
  min-height: 52px;
  transition: transform 0.15s;
  cursor: default;
  animation: fadeIn 0.4s ease both;
}
.hm-cell:hover { transform: scale(1.04); z-index: 2; }
.hm-name { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85; }
.hm-val { font-family: var(--mono); font-size: 0.78rem; font-weight: 700; }

/* ── BRIEF CONTENT ─────────────────────────────────── */
.brief { font-size: 0.85rem; line-height: 1.8; color: var(--text); }
.brief h2 {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin: 1.5rem 0 0.6rem;
  padding-bottom: 0.35rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.brief h2:first-child { margin-top: 0; }
.brief h2 .sec-icon { font-size: 0.65rem; }
.brief h3 {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--blue);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 1rem 0 0.35rem;
}
.brief p { margin-bottom: 0.7rem; }
.brief strong { font-weight: 600; color: var(--text); }
.brief em { color: var(--muted); }
.brief ul { margin: 0.5rem 0 0.75rem; display: flex; flex-direction: column; gap: 4px; list-style: none; }
.brief li {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  font-size: 0.82rem;
  line-height: 1.6;
  padding: 0.2rem 0;
}
.brief li::before {
  content: '▸';
  color: var(--green);
  font-family: var(--mono);
  font-size: 0.7rem;
  flex-shrink: 0;
  margin-top: 2px;
}
.brief hr { border: none; border-top: 1px dashed var(--border); margin: 1.25rem 0; }

/* callout boxes */
.callout {
  border-radius: 5px;
  padding: 0.65rem 0.85rem;
  margin: 0.75rem 0;
  font-size: 0.8rem;
  line-height: 1.6;
  border-left: 3px solid;
}
.callout-green { background: var(--green-bg); border-color: var(--green2); color: var(--text2); }
.callout-amber { background: var(--amber-bg); border-color: var(--amber); color: var(--text2); }
.callout-red { background: var(--red-bg); border-color: var(--red); color: var(--text2); }
.callout-blue { background: var(--blue-bg); border-color: var(--blue); color: var(--text2); }
.callout-label { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem; }
.callout-green .callout-label { color: var(--green); }
.callout-amber .callout-label { color: var(--amber); }
.callout-red .callout-label { color: var(--red); }
.callout-blue .callout-label { color: var(--blue); }

/* ── NEWS LIST ─────────────────────────────────────── */
.news-item {
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.news-item:last-child { border-bottom: none; }
.news-time { font-family: var(--mono); font-size: 0.52rem; color: var(--muted); letter-spacing: 0.05em; }
.news-text { font-size: 0.78rem; line-height: 1.5; color: var(--text); }
.news-tag { font-family: var(--mono); font-size: 0.48rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); }

/* ── EARNINGS STRIP ────────────────────────────────── */
.earnings-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
}
.earn-cell {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.6rem;
  background: var(--surface2);
  border-radius: 4px;
}
.earn-ticker { font-family: var(--mono); font-size: 0.72rem; font-weight: 600; color: var(--text); min-width: 36px; }
.earn-info { font-family: var(--mono); font-size: 0.55rem; color: var(--muted); letter-spacing: 0.04em; }
.earn-when { font-family: var(--mono); font-size: 0.5rem; padding: 0.1rem 0.3rem; border-radius: 2px; margin-left: auto; flex-shrink: 0; }
.earn-bmo { color: var(--amber); background: var(--amber-bg); }
.earn-amc { color: var(--blue); background: var(--blue-bg); }

/* ── ECONOMIC CALENDAR ─────────────────────────────── */
.econ-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.45rem 0;
  border-bottom: 1px solid var(--border);
}
.econ-item:last-child { border-bottom: none; }
.econ-time { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); min-width: 48px; }
.econ-name { font-size: 0.78rem; color: var(--text); flex: 1; }
.econ-impact { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.econ-impact.high { background: var(--red); box-shadow: 0 0 6px var(--red); }
.econ-impact.med { background: var(--amber); }
.econ-impact.low { background: var(--muted); }

/* ── LOADING / ERROR ───────────────────────────────── */
.brief-loading {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  padding: 2.5rem 1rem;
  text-align: center;
  letter-spacing: 0.05em;
}
.brief-error { font-family: var(--mono); font-size: 0.72rem; color: var(--red); padding: 2rem; text-align: center; }
.data-stale {
  font-family: var(--mono);
  font-size: 0.55rem;
  color: var(--muted);
  text-align: center;
  padding: 0.3rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.06em;
}

/* ── RESPONSIVE ────────────────────────────────────── */
@media (max-width: 900px) {
  .indices-strip { grid-template-columns: repeat(3, 1fr); }
  .main { grid-template-columns: 1fr; padding: 1rem; }
  .heatmap { grid-template-columns: repeat(3, 1fr); }
  .key-levels { overflow-x: auto; }
  .topbar { padding: 0 1rem; }
  .topbar-nav { display: none; }
}
@media (max-width: 600px) {
  .indices-strip { grid-template-columns: repeat(2, 1fr); }
  .heatmap { grid-template-columns: repeat(2, 1fr); }
  .earnings-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══════════════════════════════════════ -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><span class="dot"></span> MORNING BRIEF</div>
    <nav class="topbar-nav">
      <a href="index.html" class="active">Brief</a>
      <a href="prep.html">Pre-Market Prep</a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="topbar-date" id="currentDate"></div>
    <div class="countdown-pill pre" id="countdown">
      <span class="cdot"></span>
      <span id="cdText">--:--:--</span>
    </div>
  </div>
</div>

<!-- ═══ STALE DATA BANNER (hidden by default) ════════ -->
<div class="data-stale" id="staleBanner" style="display:none;"></div>

<!-- ═══ INDICES STRIP ════════════════════════════════ -->
<div class="indices-strip" id="indicesStrip">
  <div class="idx"><div class="idx-name" style="color:var(--muted)">Loading...</div></div>
</div>

<!-- ═══ KEY LEVELS BAR ═══════════════════════════════ -->
<div class="key-levels" id="keyLevels"></div>

<!-- ═══ FEAR & GREED ═════════════════════════════════ -->
<div class="fg-strip">
  <div class="fg-label">Fear & Greed</div>
  <div class="fg-track"><div class="fg-needle" id="fgNeedle" style="left:50%"></div></div>
  <div class="fg-score" id="fgScore">—</div>
  <div class="fg-mood" id="fgMood" style="color:var(--muted)">Loading...</div>
</div>

<!-- ═══ MAIN CONTENT ═════════════════════════════════ -->
<div class="main">

  <!-- LEFT: BRIEF + HEATMAP -->
  <div style="display:flex; flex-direction:column; gap:1.25rem;">

    <!-- SECTOR HEATMAP -->
    <div class="card" style="animation-delay:0.1s">
      <div class="card-head">
        <span class="card-title">Sector Heatmap</span>
        <span class="badge badge-green">Pre-Market</span>
      </div>
      <div class="heatmap" id="heatmap">
        <div style="grid-column:1/-1; text-align:center; padding:1rem; font-family:var(--mono); font-size:0.7rem; color:var(--muted);">Loading sectors...</div>
      </div>
    </div>

    <!-- BRIEF -->
    <div class="card" style="animation-delay:0.2s">
      <div class="card-head">
        <span class="card-title">Today's Brief</span>
        <span class="badge badge-green" id="briefBadge">—</span>
      </div>
      <div class="card-body">
        <div class="brief" id="briefContent">
          <div class="brief-loading">Loading brief...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div style="display:flex; flex-direction:column; gap:1.25rem;">

    <!-- ECONOMIC CALENDAR -->
    <div class="card" style="animation-delay:0.15s">
      <div class="card-head">
        <span class="card-title">Econ Calendar</span>
        <span class="badge badge-amber">Today</span>
      </div>
      <div class="card-body" id="econCal">
        <div style="font-family:var(--mono); font-size:0.7rem; color:var(--muted); text-align:center;">Loading...</div>
      </div>
    </div>

    <!-- EARNINGS -->
    <div class="card" style="animation-delay:0.2s">
      <div class="card-head">
        <span class="card-title">Earnings Today</span>
        <span class="badge badge-blue">Reports</span>
      </div>
      <div class="card-body">
        <div class="earnings-grid" id="earningsGrid">
          <div style="grid-column:1/-1; text-align:center; font-family:var(--mono); font-size:0.7rem; color:var(--muted);">Loading...</div>
        </div>
      </div>
    </div>

    <!-- NEWS -->
    <div class="card" style="animation-delay:0.25s">
      <div class="card-head">
        <span class="card-title">Latest Headlines</span>
        <span class="badge badge-green">Today</span>
      </div>
      <div class="card-body" id="newsList">
        <div style="font-family:var(--mono); font-size:0.7rem; color:var(--muted); text-align:center;">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATE & COUNTDOWN
// ══════════════════════════════════════════════════════
const now = new Date();
document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', {
  weekday:'short', month:'short', day:'numeric', year:'numeric'
});

function pad(n) { return String(n).padStart(2,'0'); }
function updateCountdown() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone:'America/New_York' }));
  const open = new Date(et); open.setHours(9,30,0,0);
  const close = new Date(et); close.setHours(16,0,0,0);
  const pill = document.getElementById('countdown');
  const txt = document.getElementById('cdText');
  const day = et.getDay();

  if (day===0||day===6) { txt.textContent = 'WEEKEND'; pill.className = 'countdown-pill closed'; return; }
  if (et >= open && et <= close) {
    const d = close - et;
    const h=Math.floor(d/3600000), m=Math.floor((d%3600000)/60000), s=Math.floor((d%60000)/1000);
    txt.textContent = `OPEN  ${pad(h)}:${pad(m)}:${pad(s)}`;
    pill.className = 'countdown-pill open';
    return;
  }
  if (et > close) { txt.textContent = 'CLOSED'; pill.className = 'countdown-pill closed'; return; }
  const d = open - et;
  const h=Math.floor(d/3600000), m=Math.floor((d%3600000)/60000), s=Math.floor((d%60000)/1000);
  txt.textContent = `OPENS ${pad(h)}:${pad(m)}:${pad(s)}`;
  pill.className = 'countdown-pill pre';
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ══════════════════════════════════════════════════════
// SPARKLINE GENERATOR
// ══════════════════════════════════════════════════════
function sparkSVG(seed, isUp) {
  const pts = [];
  let y = 9, r = seed || 42;
  for (let i = 0; i < 20; i++) {
    r = (r * 9301 + 49297) % 233280;
    y += ((r / 233280) - 0.48) * 5;
    y = Math.max(2, Math.min(16, y));
    pts.push(`${i * (48/19)},${y}`);
  }
  const c = isUp ? 'var(--green)' : 'var(--red)';
  return `<svg viewBox="0 0 48 18" class="idx-spark" xmlns="http://www.w3.org/2000/svg">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${c}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ══════════════════════════════════════════════════════
// LOAD DATA & RENDER
// ══════════════════════════════════════════════════════
async function loadData() {
  try {
    const resp = await fetch('data/market-data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Check if data is stale (older than 18 hours)
    const generated = new Date(data.generated);
    const hoursOld = (Date.now() - generated.getTime()) / 3600000;
    if (hoursOld > 18) {
      const banner = document.getElementById('staleBanner');
      banner.style.display = 'block';
      banner.textContent = `⚠ Data from ${generated.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })} — next update at 5:30 AM ET`;
    }

    renderIndices(data.indices || []);
    renderKeyLevels(data.keyLevels || []);
    renderFearGreed(data.fearGreed || { score: 50, label: 'Neutral' });
    renderHeatmap(data.sectors || []);
    renderBrief(data.brief || '<p>No brief available.</p>', data.date);
    renderEcon(data.econ || []);
    renderEarnings(data.earnings || []);
    renderNews(data.news || []);

  } catch (err) {
    console.error('Failed to load market data:', err);
    document.getElementById('briefContent').innerHTML =
      '<div class="brief-error">Failed to load market data.<br><span style="color:var(--muted);font-size:0.65rem;">Check that data/market-data.json exists.</span></div>';
  }
}

// ── Render functions ───────────────────────────────────

function renderIndices(indices) {
  if (!indices.length) return;
  document.getElementById('indicesStrip').innerHTML = indices.map((idx, i) => {
    const chg = idx.chg ?? 0;
    const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
    const sign = chg > 0 ? '+' : '';
    return `<div class="idx" style="animation-delay:${i*0.05}s">
      <div class="idx-top">
        <div class="idx-name">${idx.name}</div>
        ${sparkSVG(i * 37 + 11, chg >= 0)}
      </div>
      <div class="idx-val">${idx.val}</div>
      <div class="idx-chg ${cls}"><span class="arrow">${arrow}</span> ${sign}${chg.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

function renderKeyLevels(levels) {
  if (!levels.length) { document.getElementById('keyLevels').style.display = 'none'; return; }
  document.getElementById('keyLevels').innerHTML = levels.map(kl =>
    `<div class="kl-item">
      <span class="kl-tag ${kl.tag}">${kl.tag}</span>
      <span class="kl-text">${kl.label}</span>
      <span class="kl-val">${kl.val}</span>
    </div>`
  ).join('');
}

function renderFearGreed(fg) {
  const fgColor = fg.score < 25 ? 'var(--red)' : fg.score < 45 ? 'var(--amber)' : fg.score < 55 ? 'var(--muted)' : fg.score < 75 ? 'var(--blue)' : 'var(--green)';
  setTimeout(() => {
    const needle = document.getElementById('fgNeedle');
    needle.style.left = fg.score + '%';
    needle.style.background = fgColor;
    needle.style.boxShadow = `0 0 8px ${fgColor}`;
  }, 200);
  document.getElementById('fgScore').textContent = fg.score;
  document.getElementById('fgScore').style.color = fgColor;
  document.getElementById('fgMood').textContent = fg.label;
  document.getElementById('fgMood').style.color = fgColor;
}

function renderHeatmap(sectors) {
  if (!sectors.length) { document.getElementById('heatmap').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:1rem;font-family:var(--mono);font-size:0.7rem;color:var(--muted);">No sector data.</div>'; return; }
  document.getElementById('heatmap').innerHTML = sectors.map((s, i) => {
    const chg = s.chg ?? 0;
    const intensity = Math.min(Math.abs(chg) / 2, 1);
    let bg, txt;
    if (chg >= 0) {
      bg = `rgba(0,224,160,${0.06 + intensity * 0.18})`;
      txt = `rgba(0,224,160,${0.6 + intensity * 0.4})`;
    } else {
      bg = `rgba(255,64,96,${0.06 + intensity * 0.18})`;
      txt = `rgba(255,64,96,${0.6 + intensity * 0.4})`;
    }
    const sign = chg >= 0 ? '+' : '';
    return `<div class="hm-cell" style="background:${bg}; animation-delay:${0.1 + i*0.03}s">
      <div class="hm-name" style="color:${txt}">${s.name}</div>
      <div class="hm-val" style="color:${txt}">${sign}${chg.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

function renderBrief(html, date) {
  document.getElementById('briefContent').innerHTML = html;
  document.getElementById('briefBadge').textContent = date || '—';
}

function renderEcon(econ) {
  if (!econ.length) { document.getElementById('econCal').innerHTML = '<div style="font-family:var(--mono);font-size:0.7rem;color:var(--muted);text-align:center;">No events today.</div>'; return; }
  document.getElementById('econCal').innerHTML = econ.map(e =>
    `<div class="econ-item">
      <div class="econ-time">${e.time}</div>
      <div class="econ-name">${e.name}</div>
      <div class="econ-impact ${e.impact}" title="${e.impact} impact"></div>
    </div>`
  ).join('');
}

function renderEarnings(earnings) {
  if (!earnings.length) { document.getElementById('earningsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;font-family:var(--mono);font-size:0.7rem;color:var(--muted);">No earnings today.</div>'; return; }
  document.getElementById('earningsGrid').innerHTML = earnings.map(e =>
    `<div class="earn-cell">
      <div class="earn-ticker">${e.ticker}</div>
      <div class="earn-info">${e.info}</div>
      <div class="earn-when ${e.when === 'BMO' ? 'earn-bmo' : 'earn-amc'}">${e.when}</div>
    </div>`
  ).join('');
}

function renderNews(news) {
  if (!news.length) { document.getElementById('newsList').innerHTML = '<div style="font-family:var(--mono);font-size:0.7rem;color:var(--muted);text-align:center;">No headlines.</div>'; return; }
  document.getElementById('newsList').innerHTML = news.map(n =>
    `<div class="news-item">
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <div class="news-time">${n.time}</div>
        <div class="news-tag">${n.tag}</div>
      </div>
      <div class="news-text">${n.text}</div>
    </div>`
  ).join('');
}

// ── INIT ──────────────────────────────────────────────
loadData();
</script>
</body>
</html>
