name: Morning Brief Pipeline

on:
  schedule:
    # Run at 6 AM Eastern on weekdays
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv anthropic beautifulsoup4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POLYGON_API_KEY=${{ secrets.POLYGON_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          OUTPUT_PATH=./data/market-data.json
          EOF

      - name: Run morning brief pipeline
        run: python run_morning_brief.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily market brief update"
          file_pattern: data/market-data.json